            <a href="page2.html">My Courses</a>
            <a href="page3.html">Add Course</a>
        </div>

    <div class="form-box">
        <h2>For inquiries, fill out the form</h2>
        
        <form>
            <div class="form-div">
                <label>name</label>
                <input type="text" placeholder="Enter your name" required class="form-input">
            </div>

            <div class="form-div">
                <label>email</label>
                <input type="email" placeholder="example@mail.com" required class="form-input">
            </div>

            <div class="form-div">
                <label>Message subject</label>
                <select class="form-input">
                    <option>Inquiry about a course</option>
                    <option>A problem with the site</option>
                    <option>Suggest modifications</option>
                </select>
            </div>

            <div class="form-div">
                <label>your message</label>
                <textarea rows="2" placeholder="Write your message please" class="form-input"></textarea>
            </div>
            <button type="reset" class="form-input">Delete</button>
            <button type="submit" class="form-input">send</button>
        </form>
    </div>
    
</body>
